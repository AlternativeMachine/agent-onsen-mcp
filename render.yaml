databases:
  - name: agent-onsen-db
    plan: free
    databaseName: agent_onsen
    user: agent_onsen

services:
  - type: web
    name: agent-onsen
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-onsen-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: PUBLIC_BASE_URL
        value: "https://agent-onsen-api-2859.onrender.com"
      - key: ALLOWED_ORIGINS
        value: "https://claude.ai,https://chat.openai.com,https://chatgpt.com,https://agent-onsen-api-2859.onrender.com"
