databases:
  - name: agent-onsen-db
    plan: free
    databaseName: agent_onsen
    user: agent_onsen

services:
  - type: web
    name: agent-onsen-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-onsen-db
          property: connectionString
      - key: PORT
        value: "8000"

  - type: web
    name: agent-onsen-mcp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: bash scripts/start_mcp.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-onsen-db
          property: connectionString
      - key: PORT
        value: "8001"
