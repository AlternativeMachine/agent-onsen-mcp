services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_onsen
      POSTGRES_PASSWORD: agent_onsen
      POSTGRES_DB: agent_onsen
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agent_onsen -d agent_onsen']
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy
    command: bash -lc "pip install -r requirements.txt && bash scripts/start_api.sh"
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+psycopg://agent_onsen:agent_onsen@db:5432/agent_onsen
      PUBLIC_BASE_URL: http://localhost:8000
      MCP_PUBLIC_URL: http://localhost:8000/mcp
      ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      PORT: 8000

volumes:
  pgdata:
